name: Embedded CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-arm-none-eabi

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version

      - name: Configure CMake
        run: |
          cmake -S . \
            -B build-${{ matrix.build_type }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build firmware
        run: |
          cmake --build build-${{ matrix.build_type }} --verbose

      - name: Show firmware size
        run: |
          arm-none-eabi-size build-${{ matrix.build_type }}/main.elf

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.build_type }}
          path: |
            build-${{ matrix.build_type }}/main.elf
            build-${{ matrix.build_type }}/main.bin
            build-${{ matrix.build_type }}/main.hex
            build-${{ matrix.build_type }}/main.map
          if-no-files-found: error

  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --std=c11 \
            --suppress=missingIncludeSystem \
            app drivers firmware diagnostics
  
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            gcc-arm-none-eabi \
            clang-tidy

      - name: Configure CMake
        run: |
          cmake -S . \
            -B build-clang-tidy \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p build-clang-tidy \
            '^(app|drivers|firmware|diagnostics)/.*\.c$' 
             
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure host unit tests
        run: |
          cmake -S tests \
            -B build-tests \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build host unit tests
        run: |
          cmake --build build-tests --verbose

      - name: Run unit tests
        run: |
          ctest \
            --test-dir build-tests \
            --output-on-failure

  package:
   needs:
    - build
    - cppcheck
    - clang-tidy
    - unit-tests

   runs-on: ubuntu-latest

   steps:
    - name: Download Debug firmware
      uses: actions/download-artifact@v4
      with:
        name: firmware-Debug
        path: release/Debug

    - name: Download Release firmware
      uses: actions/download-artifact@v4
      with:
        name: firmware-Release
        path: release/Release

    - name: Show package contents
      run: |
        ls -R release

    - name: Upload final package
      uses: actions/upload-artifact@v4
      with:
        name: firmware-package
        path: release/firmware-package.zip